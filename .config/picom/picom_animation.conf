backend = "glx";
vsync = true;

shadow = true;
shadow-radius = 12;
shadow-offset-x = -15;
shadow-offset-y = -15;
shadow-opacity = 0.7;

shadow-exclude = [
  "window_type = 'menu'"
];

fading = false;
fade-in-step = 0.03;
fade-out-step = 0.03;

corner-radius = 5;

inactive-opacity = 0.7;
active-opacity = 1.0;

blur:
{
  method = "dual_kawase";
  strength = 5;
}

blur-background = true;

blur-background-exclude = [
  "window_type = 'menu'"
];

opacity-rule = [
  "100:class_g = 'org.mozilla.firefox'",
  "100:class_g = 'firefox'",
  "90:class_g = 'i3lock'"
];

animations = (
{
    triggers = ["close"];
    opacity = {
      curve = "cubic-bezier(0,1,1,1)";
      duration = 0.1;
      start = "window-raw-opacity-before";
      end = 0;
    };
    blur-opacity = "opacity";
    shadow-opacity = "opacity";
    offset-x = "(1 - scale-x) / 2 * window-width";
    offset-y = "(1 - scale-y) / 2 * window-height";
    scale-y = {
      curve = "cubic-bezier(0,1.3,1,1)";
      duration = 0.2;
      start = 1;
      end = 0.6;
    };
    scale-x = 1;
    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
    shadow-offset-x = "offset-x";
    shadow-offset-y = "offset-y";
  },

  {
    triggers = ["open"];
    opacity = {
      curve = "linear";
      duration = 0.05;
      start = 0;
      end = "window-raw-opacity";
    };
    blur-opacity = "opacity";
    shadow-opacity = "opacity";
    offset-x = "(1 - scale-x) / 2 * window-width";
    offset-y = "(1 - scale-y) / 2 * window-height";
    scale-y = {
      curve = "cubic-bezier(0,1.3,1,1)";
      duration = 0.3;
      start = 0.6;
      end = 1;
    };
    scale-x = 1;
    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
    shadow-offset-x = "offset-x";
    shadow-offset-y = "offset-y";
  },

  {
    triggers = ["show"];
    opacity = {
      curve = "linear";
      duration = 0.1;
      start = 0;
      end = "window-raw-opacity";
    };
  },
   {
   triggers = ["hide"];
   opacity = {
     curve = "linear";
     duration = 0.2;
     start = "window-raw-opacity-before";
     end = 0;
   };
   blur-opacity = "opacity";
   shadow-opacity = "opacity";
 },

  {
    triggers = ["geometry"]
    scale-x = {
      curve = "cubic-bezier(0,0,0,1.28)";
      duration = 0.22;
      start = "window-width-before / window-width";
      end = 1;
    }
    scale-y = {
      curve = "cubic-bezier(0,0,0,1.28)";
      duration = 0.22;
      start = "window-height-before / window-height";
      end = 1;
    }
    offset-x = {
      curve = "cubic-bezier(0,0,0,1.28)";
      duration = 0.22;
      start = "window-x-before - window-x";
      end = 0;
    }
    offset-y = {
      curve = "cubic-bezier(0,0,0,1.28)";
      duration = 0.22;
      start = "window-y-before - window-y";
      end = 0;
    }

    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
    shadow-offset-x = "offset-x";
    shadow-offset-y = "offset-y";
  }
)
