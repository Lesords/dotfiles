separator=true
separator_block_width=15

[net]
command=echo "󰖩 $(ip route get 1 | awk '{print $7;exit}')"
interval=5

[mem]
command=echo " $(free -h | awk '/Mem:/ {print $3 "/" $2}')"
interval=5

[cpu]
command=echo " $(grep 'cpu ' /proc/stat | awk '{usage=($2+$4)*100/($2+$4+$5)} END {print int(usage) "%"}')"
interval=2

[time]
command=date '+ %Y-%m-%d %H:%M:%S'
interval=1
