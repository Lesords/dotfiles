[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/example]
monitor = ${env:MONITOR}
width = 100%
height = 24pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = JetBrains Mono Nerd Font;2

modules-left = xworkspaces xwindow
modules-right = filesystem pulseaudio xkeyboard memory cpu wlan eth date powermenu

cursor-click = pointer
cursor-scroll = ns-resize

scroll-up = i3-msg workspace next_on_output
scroll-down = i3-msg workspace prev_on_output

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[bar/main]
inherit = bar/example
modules-right = systray xkeyboard filesystem memory cpu pulseaudio backlight battery network date powermenu

[bar/secondary]
inherit = bar/example
modules-right = filesystem pulseaudio date powermenu

[module/systray]
type = internal/tray
tray-background = #ABB2BF
tray-size = 16pt

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true

label-active = %name%
label-active-foreground = ${colors.background}
label-active-background = ${colors.primary}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
label-foreground = #ffffff

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

use-ui-max = false

format-volume = <ramp-volume><label-volume>

format-muted = <label-muted>
format-muted-prefix = "ůįĚü "

label-muted = "muted"
label-muted-foreground = ${colors.disabled}

label-volume = %percentage%%

ramp-volume-0 = "ůįēŅ "
ramp-volume-1 = "ůįĖÄ "
ramp-volume-2 = "ůįēĺ "
ramp-volume-foreground = ${colors.primary}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

format = <label-layout> <label-indicator>

label-layout = %layout%

label-indicator-on = "ÔÄ£"
label-indicator-on-foreground = ${colors.primary}
label-indicator-off = ""

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/backlight]
;type = internal/xbacklight
type = internal/backlight

; Use the following command to list available cards:
; $ ls -1 /sys/class/backlight/
card = intel_backlight

enable-scroll = true
use-actual-brightness = true

format = <ramp><label>

label = " %percentage%%"

; Only applies if <ramp> is used
ramp-0 = "ÓŹē"
ramp-1 = "ÓŹź"
ramp-2 = "ÓŹé"
ramp-3 = "ÓŹ†"
ramp-4 = "Óć®"
ramp-foreground = ${colors.primary}

[module/battery]
type = internal/battery

; This is useful in case the battery never reports 100% charge
full-at = 99

; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = BAT1
adapter = ACAD

poll-interval = 2

format-full        = <ramp-capacity><label-full>
format-discharging = <ramp-capacity><label-discharging>

format-charging                   = <animation-charging><label-charging>
format-charging-prefix            = "ÔÉß"
format-charging-prefix-foreground = ${colors.primary}

label-full        = " %percentage%%"
label-charging    = " %percentage%%"
label-discharging = " %percentage%%"

; Only applies if <ramp-capacity> is used
ramp-capacity-0 = "ÔČĄ "
ramp-capacity-1 = "ÔČÉ "
ramp-capacity-2 = "ÔČā "
ramp-capacity-3 = "ÔČĀ "
ramp-capacity-4 = "ÔČÄ "
ramp-capacity-foreground = ${colors.primary}
ramp-capacity-font = 7

; Only applies if <animation-charging> is used
animation-charging-0 = "ÔČĄ "
animation-charging-1 = "ÔČÉ "
animation-charging-2 = "ÔČā "
animation-charging-3 = "ÔČĀ "
animation-charging-4 = "ÔČÄ "
animation-charging-foreground = ${colors.primary}
animation-charging-font = 7

; Framerate in milliseconds
animation-charging-framerate = 700

[module/network]
type = custom/script
exec = ~/.config/polybar/scripts/network-status.sh
interval = 5
click-left = ~/.config/polybar/scripts/network-info.sh

[module/date]
type = internal/date
interval = 1

date = %Y-%m-%d %H:%M:%S
date-alt = %H:%M

label = %date%
label-foreground = ${colors.primary}

[module/powermenu]
type = custom/text
content = ůįź•
content-foreground = ${colors.primary}
click-left = ~/.config/polybar/scripts/powermenu.sh

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
