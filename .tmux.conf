# basic
set-option -g mouse on

set -g history-limit 2000
setw -g mode-keys vi

setw -g automatic-rename off
setw -g allow-rename off

set -g default-terminal tmux-256color
set-option -ga terminal-overrides ",*256col*:Tc"

if-shell 'tmux -V | grep -Eq "3\.[3-9]|[4-9]\."' "set -g allow-passthrough on"
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# keymap
bind -r ^h select-pane -L
bind -r ^j select-pane -D
bind -r ^k select-pane -U
bind -r ^l select-pane -R

bind -r - resize-pane -U 5
bind -r + resize-pane -D 5
bind -r < resize-pane -L 5
bind -r > resize-pane -R 5

## pane mode (variable-based, no timeout)
bind e run-shell '
  r=$(tmux show -gv @resize_mode 2>/dev/null);
  l=$(tmux show -gv @layout_mode 2>/dev/null);
  if [ "$r" = "1" ]; then
    tmux set -g -u @resize_mode; tmux set -g @layout_mode 1;
  elif [ "$l" = "1" ]; then
    tmux set -g -u @layout_mode;
  else
    tmux set -g @resize_mode 1;
  fi'

bind -n -r h if-shell -F '#{@resize_mode}' 'resize-pane -L 5'      'send-keys h'
bind -n -r j if-shell -F '#{@resize_mode}' 'resize-pane -D 5'      'send-keys j'
bind -n -r k if-shell -F '#{@resize_mode}' 'resize-pane -U 5'      'send-keys k'
bind -n -r l if-shell -F '#{@resize_mode}' 'resize-pane -R 5'      'send-keys l'
bind -n -r H if-shell -F '#{@resize_mode}' 'resize-pane -L 20'     'send-keys H'
bind -n -r J if-shell -F '#{@resize_mode}' 'resize-pane -D 20'     'send-keys J'
bind -n -r K if-shell -F '#{@resize_mode}' 'resize-pane -U 20'     'send-keys K'
bind -n -r L if-shell -F '#{@resize_mode}' 'resize-pane -R 20'     'send-keys L'
bind -n -r z if-shell -F '#{@resize_mode}' 'resize-pane -Z'        'send-keys z'
bind -n -r q run-shell '
  if tmux show -gv @resize_mode 2>/dev/null | grep -q 1; then
    tmux set -g -u @resize_mode;
  elif tmux show -gv @layout_mode 2>/dev/null | grep -q 1; then
    tmux set -g -u @layout_mode;
  else
    tmux send-keys q;
  fi'

## layout mode
bind -n -r space if-shell -F '#{@layout_mode}' "run \"tmux select-layout main-vertical; tmux resize-pane -t 0 -x \$(( \$(tmux display -p '#{window_width}') * 70 / 100 ))\"" 'send-keys space'
bind -n -r t if-shell -F '#{@layout_mode}' 'select-layout tiled'   'send-keys t'
bind -n -r n if-shell -F '#{@layout_mode}' 'next-layout'           'send-keys n'
bind -n -r p if-shell -F '#{@layout_mode}' 'previous-layout'       'send-keys p'

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

## popup window
if-shell -b 'tmux -V | grep -qE "^tmux ([4-9]|3\.([2-9]|[1-9][0-9]))"' {
    bind-key C-p display-popup -w 80% -h 80% -E -b rounded -T " #[fg=#{@foreground-alt},bg=#{@active},bold] POPUP #[default] " "$SHELL -l"
}

bind-key S setw synchronize-panes
bind-key R source-file ~/.tmux.conf \; display-message "tmux config reloaded"

bind-key -n C-M-p last-window
bind-key -n C-M-h previous-window
bind-key -n C-M-l next-window
bind-key -n C-M-z resize-pane -Z

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" { send-keys C-h } { if-shell -F '#{pane_at_left}'   {} { select-pane -L } }
bind-key -n 'C-j' if-shell "$is_vim" { send-keys C-j } { if-shell -F '#{pane_at_bottom}' {} { select-pane -D } }
bind-key -n 'C-k' if-shell "$is_vim" { send-keys C-k } { if-shell -F '#{pane_at_top}'    {} { select-pane -U } }
bind-key -n 'C-l' if-shell "$is_vim" { send-keys C-l } { if-shell -F '#{pane_at_right}'  {} { select-pane -R } }

bind-key -T copy-mode-vi 'C-h' if-shell -F '#{pane_at_left}'   {} { select-pane -L }
bind-key -T copy-mode-vi 'C-j' if-shell -F '#{pane_at_bottom}' {} { select-pane -D }
bind-key -T copy-mode-vi 'C-k' if-shell -F '#{pane_at_top}'    {} { select-pane -U }
bind-key -T copy-mode-vi 'C-l' if-shell -F '#{pane_at_right}'  {} { select-pane -R }

if-shell "command -v xclip >/dev/null 2>&1" \
  "bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'; \
   bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'; \
   bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'" \
  ""

bind -T copy-mode-vi r send-keys -X copy-pipe-and-cancel "tmux-open-vim"

# ui
## theme color
if-shell -F '#{IS_SSH}' {
    set -g @background      "#24273a"
    set -g @background-alt  "#494d64"
    set -g @foreground      "#cad3f5"
    set -g @foreground-alt  "#181926"
    set -g @active          "#c6a0f6"
    set -g @selected        "#c6a0f6"
} {
    set -g @background      "#273746"
    set -g @background-alt  "#46475a"
    set -g @foreground      "white"
    set -g @foreground-alt  "#000000"
    set -g @active          "#0088cc"
    set -g @selected        "#08C9D2"
}

## style
set -gF status-fg '#{@foreground}'
set -gF status-bg '#{@background}'
set -g mode-style "fg=#{@foreground-alt},bg=#{@active},bold"
setw -g window-status-activity-style none
setw -g window-status-bell-style none

## left down
set-option -g status-left '#{prefix_highlight}#[fg=#{@foreground-alt},bg=#{@active}] #S #{E:@sep_cur_right}'
set-option -g status-left-length 20

## window list
set-option -g status-justify centre # 居中显示
set -g @sep_left       "#[fg=#{@background-alt},bg=#{@background}]"
set -g @sep_right      "#[fg=#{@background-alt},bg=#{@background}]"
set -g @sep_cur_left   "#[fg=#{@active},bg=#{@background}]"
set -g @sep_cur_right  "#[fg=#{@active},bg=#{@background}]"

set-window-option -g window-status-format         "#{E:@sep_left}#[fg=#{@foreground},bg=#{@background-alt}]#I #W #{window_flags}#{E:@sep_right}"
set-window-option -g window-status-current-format "#{E:@sep_cur_left}#[fg=#{@foreground-alt},bg=#{@active}]#I #W #{window_flags}#{E:@sep_cur_right}"

## right down
set-option -g status-right '#{E:@sep_cur_left}#[fg=#{@foreground-alt},bg=#{@active}] %Y-%m-%d %H:%M '
set-option -g status-right-length 40

## border style
set -g pane-border-style        "fg=#{@background-alt}"
set -g pane-active-border-style "fg=#{@selected}"

## popup style
set -g popup-style        "fg=#{@foreground},bg=#{@background}"
set -g popup-border-style "fg=#{@selected}"

if-shell -b 'tmux -V | grep -qE "^tmux ([3-9]|2\.([6-9]|[1-9][0-9]))"' \
  'set -g pane-border-status top; set -g pane-border-format " #[bold]#P #[nobold]#{pane_current_command} "'
if-shell -b 'tmux -V | grep -qE "^tmux ([4-9]|3\.([2-9]|[1-9][0-9]))"' \
  'set -g pane-border-lines heavy'

# plugin
CUSTOM_PLUGINS_DIR='~/.config/tmux/plugins/'
set-environment -g TMUX_PLUGIN_MANAGER_PATH $CUSTOM_PLUGINS_DIR

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-cowboy'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'omerxx/tmux-floax'

# tmux-floax
set -g @floax-bind '-n C-M-o'
set -g @floax-text-color 'default'

# tmux-fingers
set -g @fingers-key space

# prefix_highlight
set -g @prefix_highlight_prefix_prompt '  '
set -g @prefix_highlight_fg '#{@selected}'
set -g @prefix_highlight_bg '#{@background-alt}'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=#{@foreground},bg=#{@background-alt},bold'
set -g @prefix_highlight_copy_prompt '  '
set -g @prefix_highlight_show_sync_mode 'on'
set -g @prefix_highlight_sync_mode_attr 'fg=#{@foreground},bg=#{@background-alt},bold'
set -g @prefix_highlight_sync_prompt '  '
set -g @prefix_highlight_show_resize_mode 'on'
set -g @prefix_highlight_resize_mode_attr 'fg=#{@foreground},bg=#{@background-alt},bold'
set -g @prefix_highlight_resize_prompt '  '
set -g @prefix_highlight_layout_prompt '  '
set -g @prefix_highlight_layout_mode_attr 'fg=#{@foreground},bg=#{@background-alt},bold'
set -g @prefix_highlight_empty_attr 'fg=default,bg=#{@background-alt}'
set -g @prefix_highlight_empty_has_affixes 'on'
set -g @prefix_highlight_empty_prompt '  '

run '~/.config/tmux/plugins/tpm/tpm'
