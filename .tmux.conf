# basic
set-option -g mouse on

set -g history-limit 2000
setw -g mode-keys vi

setw -g automatic-rename off
setw -g allow-rename off

set -g default-terminal tmux-256color
set-option -ga terminal-overrides ",*256col*:Tc"

if-shell 'tmux -V | grep -Eq "3\.[3-9]|[4-9]\."' "set -g allow-passthrough on"
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# keymap
bind -r ^h select-pane -L
bind -r ^j select-pane -D
bind -r ^k select-pane -U
bind -r ^l select-pane -R

bind -r - resize-pane -U 5
bind -r + resize-pane -D 5
bind -r < resize-pane -L 5
bind -r > resize-pane -R 5

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind-key S setw synchronize-panes

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" { send-keys C-h } { if-shell -F '#{pane_at_left}'   {} { select-pane -L } }
bind-key -n 'C-j' if-shell "$is_vim" { send-keys C-j } { if-shell -F '#{pane_at_bottom}' {} { select-pane -D } }
bind-key -n 'C-k' if-shell "$is_vim" { send-keys C-k } { if-shell -F '#{pane_at_top}'    {} { select-pane -U } }
bind-key -n 'C-l' if-shell "$is_vim" { send-keys C-l } { if-shell -F '#{pane_at_right}'  {} { select-pane -R } }

bind-key -T copy-mode-vi 'C-h' if-shell -F '#{pane_at_left}'   {} { select-pane -L }
bind-key -T copy-mode-vi 'C-j' if-shell -F '#{pane_at_bottom}' {} { select-pane -D }
bind-key -T copy-mode-vi 'C-k' if-shell -F '#{pane_at_top}'    {} { select-pane -U }
bind-key -T copy-mode-vi 'C-l' if-shell -F '#{pane_at_right}'  {} { select-pane -R }

if-shell "command -v xclip >/dev/null 2>&1" \
  "bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'; \
   bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'; \
   bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'" \
  ""

bind -T copy-mode-vi r send-keys -X copy-pipe-and-cancel "tmux_open_vim"

# ui
## style
set -g status-bg '#273746'  # 背景色
set -g status-fg colour6    # 前景色
set -g mode-style "fg=white,bg=#46475a,bold"

## left down
set-option -g status-left '#{?client_ssh,#[fg=grey][server],}#{prefix_highlight}#[bg=colour31,fg=black] #S '
set-option -g status-left-length 20

## window list
set-option -g status-justify centre # 居中显示
set-window-option -g window-status-format "#[fg=white,bg=#46475a] #I #W #{window_flags} "
set-window-option -g window-status-current-format "#[fg=black,bg=#08C9D2] #I #W #{window_flags} "

## border style
set -g pane-border-style fg="#273746"
set -g pane-active-border-style fg="#08C9D2"

if-shell -b 'tmux -V | grep -qE "^tmux ([3-9]|2\.([6-9]|[1-9][0-9]))"' \
  'set -g pane-border-status top; set -g pane-border-format " #[bold]#P #[nobold]#{pane_current_command} "'
if-shell -b 'tmux -V | grep -qE "^tmux ([4-9]|3\.([2-9]|[1-9][0-9]))"' \
  'set -g pane-border-lines heavy'

# plugin
CUSTOM_PLUGINS_DIR='~/.config/tmux/plugins/'
set-environment -g TMUX_PLUGIN_MANAGER_PATH $CUSTOM_PLUGINS_DIR

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-cowboy'
set -g @plugin 'laktak/extrakto'

# prefix_highlight
set -g @prefix_highlight_prefix_prompt 'Wait'
set -g @prefix_highlight_fg 'yellow'
set -g @prefix_highlight_bg '#273746'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=black,bg=green'
set -g @prefix_highlight_show_sync_mode 'on'
set -g @prefix_highlight_sync_mode_attr 'fg=black,bg=green'
set -g @prefix_highlight_empty_has_affixes 'on'
set -g @prefix_highlight_empty_prompt 'Tmux'

run '~/.config/tmux/plugins/tpm/tpm'
